<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>빵긋루트 데이터베이스 초기화(Seed)</title>
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; padding: 40px; background: #f8f5f2; color: #2d241e; max-width: 800px; margin: 0 auto; line-height: 1.6; }
    .btn { padding: 16px 32px; background: #D38A28; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; display: block; width: 100%; margin-bottom: 20px; transition: transform 0.2s; }
    .btn:hover { background: #A66B1B; transform: translateY(-2px); }
    #log { padding: 20px; background: white; border-radius: 12px; height: 300px; overflow-y: auto; font-family: monospace; border: 1px solid #ddd; }
    .alert { padding: 20px; background: #fff3cd; color: #856404; border-radius: 12px; margin-bottom: 30px; border: 1px solid #ffeeba; }
    code { background: #eee; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
  <h1>🥐 빵긋루트 가상 실데이터 50건 주입기</h1>
  
  <div class="alert">
    <strong>⚠️ 핵심 체크사항:</strong> 버튼을 누르기 전 파이어베이스 콘솔 확인 필수!<br><br>
    Firebase 접속 ➡️ <strong>Firestore Database</strong> ➡️ <strong>규칙(Rules)</strong> 탭에서<br>
    코드가 <code>allow read, write: if true;</code> 로 되어 있는지 반드시 확인하세요.<br>
    (권한이 잠겨있으면 빨간 에러가 뜹니다.)
  </div>

  <button class="btn" id="startBtn" onclick="startSeeding()">🚀 클릭! (테스트용 가상 데이터 50개 밀어넣기)</button>
  
  <div id="log">여기에 로그가 출력됩니다...<br></div>

  <script>
    // app.js 와 동일한 파이어베이스 키 (사용자 제공키)
    const firebaseConfig = {
      apiKey: "AIzaSyBHQBX4Vzm61UqWo5jxCYn4j46FL20J-oQ",
      authDomain: "anti-2aea7.firebaseapp.com",
      projectId: "anti-2aea7",
      storageBucket: "anti-2aea7.firebasestorage.app",
      messagingSenderId: "607908334545",
      appId: "G-CGM3Z974M3"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    const logEl = document.getElementById('log');
    function log(msg) {
      logEl.innerHTML += msg + '<br>';
      logEl.scrollTop = logEl.scrollHeight;
    }

    // 🌟 다양한 테스트를 위해 비율이 잘 섞인 50개의 실 데이터 패턴 정의 🌟
    const seedDataPatterns = [
      // 나홀로 & 1~2시간 (빠른 성심당 픽업 및 산책)
      { group: '동행 - 혼자', stay: '1~2시간', p1: ['성심당 본점', '성심당 본점'], p2: ['으능정이 문화의거리', '선택 안 함'], p3: ['선택 안 함'], note: '혼자 빵지순례 하러 왔어요! 역시 튀김소보로 최고.' },
      { group: '동행 - 혼자', stay: '1~2시간', p1: ['성심당 본점'], p2: ['대흥동 제이미카페'], p3: ['선택 안 함'], note: '빵만 후딱 사고 카페에서 쉬다 갑니다.' },
      
      // 나홀로 & 2~5시간 (여유로운 서점/카페 탐방)
      { group: '동행 - 혼자', stay: '2~5시간', p1: ['성심당 본점', '독립서점 거리'], p2: ['으능정이 문화의거리', '독립서점 거리'], p3: ['대흥동 감성카페', '대흥동 제이미카페'], note: '독립서점 구경하고 조용한 카페에서 빵이랑 커피 마셨어요.' },
      
      // 친구/커플 & 1~2시간 (간단한 포토존 방문)
      { group: '동행 - 친구/커플', stay: '1~2시간', p1: ['성심당 본점'], p2: ['스카이로드', '으능정이 문화의거리'], p3: ['선택 안 함'], note: '스카이로드 밑에서 사진 찍고 놀았어요.' },
      
      // 친구/커플 & 2~5시간 (인생샷/카페 코스 - 가장 비중 높음)
      { group: '동행 - 친구/커플', stay: '2~5시간', p1: ['성심당 본점', '스카이로드'], p2: ['스카이로드', '으능정이 문화의거리'], p3: ['대흥동 감성카페', '대흥동 카페거리'], note: '친구들이랑 예쁜 카페가서 인생샷 많이 건졌네요!' },
      { group: '동행 - 친구/커플', stay: '2~5시간', p1: ['성심당 본점'], p2: ['독립서점 거리'], p3: ['대흥동 감성카페'], note: '서점에서 책 하나씩 사고 카페에서 수다 떨기 좋은 코스' },

      // 친구/커플 & 온종일 (풀코스 먹방)
      { group: '동행 - 친구/커플', stay: '온종일', p1: ['중앙시장', '칼국수 골목'], p2: ['스카이로드'], p3: ['성심당 본점'], note: '맛있는 거 진짜 많이 먹은 하루! 대전 최고.' },
      
      // 가족 & 2~5시간 (맛집, 로컬 코스)
      { group: '동행 - 가족', stay: '2~5시간', p1: ['중앙시장'], p2: ['칼국수 골목', '으능정이 문화의거리'], p3: ['성심당 본점'], note: '가족들이랑 중앙시장 구경하고 칼국수 먹었어요. 부모님이 좋아하심.' },
      { group: '동행 - 가족', stay: '2~5시간', p1: ['성심당 본점'], p2: ['칼국수 골목'], p3: ['대흥동 카페거리'], note: '주말 가족 나들이로 딱입니다. 칼국수 강추예요.' },

      // 가족 & 온종일 (로컬 딥 투어)
      { group: '동행 - 가족', stay: '온종일', p1: ['중앙시장'], p2: ['칼국수 골목'], p3: ['성심당 본점'], note: '대전의 찐맛을 느낄 수 있는 하루' }
    ];

    async function startSeeding() {
      document.getElementById('startBtn').disabled = true;
      log('<span style="color:blue;">🟢 초기 데이터 50건 가공 및 병렬 주입 시작...</span>');
      
      try {
        const batch = db.batch(); // 50개를 한방에 넣는 트랜잭션 도구
        let count = 0;

        for(let i=0; i<50; i++) {
            const tpl = seedDataPatterns[Math.floor(Math.random() * seedDataPatterns.length)];
            const pick = arr => arr[Math.floor(Math.random() * arr.length)];
            
            let places = [];
            let p1 = pick(tpl.p1); if (p1 !== '선택 안 함') places.push(p1);
            let p2 = pick(tpl.p2); if (p2 !== '선택 안 함') places.push(p2);
            let p3 = pick(tpl.p3); if (p3 !== '선택 안 함') places.push(p3);
            
            if (places.length === 0) places.push('성심당 본점'); // 최소 1개 보장
            places = [...new Set(places)]; // 중복 장소 제거

            const record = {
                group: tpl.group,
                stay: tpl.stay,
                places: places,
                note: tpl.note,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            const docRef = db.collection('user_routes').doc();
            batch.set(docRef, record);
            count++;
        }
        
        await batch.commit(); // 파이어베이스로 묶어서 발송!

        log(`<strong style="color:green;">🚀 성공! 총 ${count}건의 가상 리뷰가 Firestore에 무사히 저장되었습니다!</strong>`);
        log(`이제 <strong><a href="/">홈페이지(index.html)</a></strong>로 돌아가서 F5(새로고침)를 눌러보세요.`);
        log(`1. 메인 화면의 '가장 많이 저장되는 곳' 차트가 아름답게 작동합니다.`);
        log(`2. 퀴즈 '나머지 루트 완성하기'를 풀면 방금 주입된 데이터를 분석하여 <strong>나만의 맞춤 타임라인</strong>을 실시간으로 조립해줍니다!`);

      } catch (error) {
        log(`<span style="color:red;">❌ 권한 또는 네트워크 에러 발생: ${error.message}</span>`);
        log(`<strong>[필수 조치 사항]</strong> 파이어베이스 규칙(Rules)이 <code>allow read, write: if true;</code> 로 풀려 있는지 꼭! 확인하세요.`);
      }
      document.getElementById('startBtn').disabled = false;
    }
  </script>
</body>
</html>
